name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "--- UPDATING REPOSITORY ---"
            cd /var/www/ai-interview-user
            git pull origin main
            
            # Tạo file .env chung cho Docker Compose
            echo "PORT=5000" > .env
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "VITE_API_URL=http://${{ secrets.HOST }}:5000" >> .env
            
            echo "--- REBUILDING & RESTARTING DOCKER CONTAINERS ---"
            # Tắt các service cũ đang chiếm port (nếu trước đó dùng pm2/nginx thuần)
            pm2 delete user-api || true
            sudo systemctl stop nginx || true
            
            # Sử dụng docker compose để build và chạy
            docker compose down || docker-compose down || true
            docker compose up -d --build || docker-compose up -d --build
            
            echo "--- DEPLOY SUCCESSFUL ---"
