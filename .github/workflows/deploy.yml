name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "--- ENSURING DIRECTORY STRUCTURE ---"
            sudo mkdir -p /var/www/ai-interview-user
            sudo chown -R $USER:$USER /var/www/ai-interview-user
            cd /var/www/ai-interview-user
            
            echo "--- UPDATING CODE FROM GITHUB ---"
            if [ ! -d ".git" ]; then
              echo "Repository not found. Cloning for the first time..."
              git clone https://github.com/binhvu2005/AI-interview-user.git .
            else
              echo "Repository found. Pulling latest changes..."
              git pull origin main
            fi
            
            echo "--- PREPARING ENVIRONMENT ---"
            # Tạo file .env chung cho Docker Compose
            echo "PORT=5000" > .env
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "VITE_API_URL=http://${{ secrets.HOST }}:5000" >> .env
            
            echo "--- REBUILDING & RESTARTING DOCKER CONTAINERS ---"
            # Giải phóng cổng 5000 và 80 triệt để
            pm2 delete user-api || true
            sudo systemctl stop nginx || true
            
            # Kill các tiến trình đang chiếm port (dùng lsof cho chắc chắn)
            sudo lsof -t -i:5000 | xargs -r sudo kill -9 || true
            sudo lsof -t -i:80 | xargs -r sudo kill -9 || true
            
            # Dừng các Docker container đang chiếm port (kể cả từ project khác)
            docker ps -q --filter "publish=5000" | xargs -r docker stop || true
            docker ps -q --filter "publish=80" | xargs -r docker stop || true
            
            # Khởi chạy Docker Compose
            # Kiểm tra xem docker compose hay docker-compose được cài đặt
            if docker compose version > /dev/null 2>&1; then
              DOCKER_CMD="docker compose"
            else
              DOCKER_CMD="docker-compose"
            fi
            
            $DOCKER_CMD down || true
            $DOCKER_CMD up -d --build
            
            echo "--- DEPLOY SUCCESSFUL ---"
